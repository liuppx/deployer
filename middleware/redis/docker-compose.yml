services:
  redis:
    # 1. 锁定 LTS 版本 7.2，使用 alpine 镜像减小体积
    image: redis:7.2.6-alpine
    container_name: redis-server
    restart: unless-stopped
    # 2. 端口映射策略
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Please set REDIS_PASSWORD in .env}
    volumes:
      - ./data/redis:/data
    # 3. 命令参数优化
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --requirepass
      - ${REDIS_PASSWORD:?Please set REDIS_PASSWORD in .env}
      - --maxmemory
      - 2gb
      - --maxmemory-policy
      - allkeys-lru
      - --dir
      - /data
    networks:
      - redis-network
    # 4. 健康检查 (可选但推荐，用于监控和自动重启判断)
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 3
networks:
  redis-network:
    name: "redis-network"
    driver: bridge
